# Compose v2 no longer needs the top-level `version` key.
services:
  statlee-web:
    build: .
    ports:
      - "5000:5000"
    # Values are interpolated from your shell or the project's .env file.
    environment:
      - APP_ENV=${APP_ENV:-development}
      # LLM provider: gemini (default) | anthropic | openai. Set the matching key.
      - LLM_PROVIDER=${LLM_PROVIDER:-gemini}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY:-}
      - PASSWORD=${PASSWORD:-}
      - DATABASE_URL=${DATABASE_URL:-}
      - SANDBOX_MODE=${SANDBOX_MODE:-subprocess}
      # For SANDBOX_MODE=docker, the shared work root (see volumes below).
      - SANDBOX_WORK_ROOT=${SANDBOX_WORK_ROOT:-}
      - REQUIRE_LOGIN=${REQUIRE_LOGIN:-false}
      - ACCOUNTS_ENABLED=${ACCOUNTS_ENABLED:-true}
    volumes:
      # DEV ONLY: live-syncs your local code into the container so you don't
      # have to rebuild on every edit. Remove this for a production-like run.
      - .:/app
      # For SANDBOX_MODE=docker (sibling containers), also mount the socket:
      # - /var/run/docker.sock:/var/run/docker.sock
      # ...and a shared run dir at the SAME absolute path both sides, then set
      # SANDBOX_WORK_ROOT to it. `docker run -v` is resolved by the HOST daemon
      # against the HOST filesystem, so the app's run dir must exist host-side:
      # - /srv/statlee-runs:/srv/statlee-runs   # SANDBOX_WORK_ROOT=/srv/statlee-runs
