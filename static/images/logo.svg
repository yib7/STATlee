<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="CodeCaster logo">
  <!-- CodeCaster mark: a "caster" broadcast node — an origin point emitting
       signal arcs. Square aspect; the header renders it at 32x32.
       Drop in an official asset later, keeping the 64x64 viewBox. -->
  <defs>
    <linearGradient id="ccg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#ccg)"/>
  <circle cx="22" cy="42" r="5" fill="#ffffff"/>
  <path d="M22 30 a12 12 0 0 1 12 12" fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" opacity="0.9"/>
  <path d="M22 22 a20 20 0 0 1 20 20" fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" opacity="0.6"/>
</svg>
