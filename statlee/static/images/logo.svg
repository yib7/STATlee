<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Statly logo">
  <!-- Statly mark: ascending statistics bars with a rising insight spark.
       Square aspect; the header renders it at 32x32 and it doubles as the
       favicon. Gradient matches the "Statly" wordmark (indigo -> purple). -->
  <defs>
    <linearGradient id="statly-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#statly-bg)"/>
  <!-- ascending bars -->
  <rect x="15" y="38" width="8" height="13" rx="3" fill="#ffffff" opacity="0.7"/>
  <rect x="28" y="30" width="8" height="21" rx="3" fill="#ffffff" opacity="0.85"/>
  <rect x="41" y="20" width="8" height="31" rx="3" fill="#ffffff"/>
  <!-- rising insight spark above the tallest bar -->
  <circle cx="45" cy="14" r="3.5" fill="#fde68a"/>
</svg>
