<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 64" width="260" height="64" role="img" aria-label="Statly">
  <!-- Statly wordmark: icon + name, for the landing page / marketing. -->
  <defs>
    <linearGradient id="wm-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
    <linearGradient id="wm-text" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7e22ce"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#wm-bg)"/>
  <rect x="15" y="38" width="8" height="13" rx="3" fill="#ffffff" opacity="0.7"/>
  <rect x="28" y="30" width="8" height="21" rx="3" fill="#ffffff" opacity="0.85"/>
  <rect x="41" y="20" width="8" height="31" rx="3" fill="#ffffff"/>
  <circle cx="45" cy="14" r="3.5" fill="#fde68a"/>
  <text x="78" y="43" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="34" font-weight="800" letter-spacing="-1" fill="url(#wm-text)">Statly</text>
</svg>
