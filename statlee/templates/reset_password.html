<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STATlee: reset your password</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/mark.png') }}">
    <style>
        :root { --indigo: #6366f1; --ink: #0b0914; --panel: #171334; --text: #e7e5f0; --muted: #a5a3b8; --line: rgba(255,255,255,0.1); }
        * { box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: var(--ink); color: var(--text); margin: 0; display: flex; min-height: 100vh; align-items: center; justify-content: center; padding: 24px; }
        .card { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 32px; max-width: 400px; width: 100%; }
        h1 { font-size: 1.3rem; margin: 0 0 8px; }
        p { color: var(--muted); line-height: 1.5; margin: 0 0 20px; }
        label { display: block; font-size: 0.85rem; margin: 0 0 6px; color: var(--muted); }
        input[type=password] { width: 100%; padding: 11px 13px; border-radius: 9px; border: 1px solid var(--line); background: #0e0b22; color: var(--text); font-size: 1rem; }
        button { width: 100%; margin-top: 18px; padding: 12px; border: 0; border-radius: 9px; background: var(--indigo); color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .msg { margin-top: 16px; font-size: 0.9rem; }
        .err { color: #f87171; }
        .ok { color: #4ade80; }
        a { color: var(--indigo); }
    </style>
</head>
<body>
    <div class="card">
        <h1>Reset your password</h1>
        {% if valid %}
        <p>Choose a new password for your STATlee account.</p>
        <form id="reset-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <input type="hidden" name="token" value="{{ token }}">
            <label for="password">New password (at least 8 characters)</label>
            <input type="password" id="password" name="password" minlength="8" autocomplete="new-password" required>
            <button type="submit">Set new password</button>
            <div class="msg" id="msg"></div>
        </form>
        {% else %}
        <p class="err">This reset link is invalid or has expired.</p>
        <p><a href="/">Return to STATlee</a> and request a new link.</p>
        {% endif %}
    </div>
    <script>
        var form = document.getElementById('reset-form');
        if (form) {
            form.addEventListener('submit', function (e) {
                e.preventDefault();
                var msg = document.getElementById('msg');
                var btn = form.querySelector('button');
                msg.textContent = '';
                msg.className = 'msg';
                btn.disabled = true;
                fetch('/reset_password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRF-Token': form.csrf_token.value
                    },
                    body: JSON.stringify({
                        token: form.token.value,
                        password: form.password.value
                    })
                }).then(function (r) {
                    return r.json().then(function (body) { return { ok: r.ok, body: body }; });
                }).then(function (res) {
                    if (res.ok) {
                        msg.textContent = 'Password reset. Redirecting to sign in...';
                        msg.className = 'msg ok';
                        setTimeout(function () { window.location.href = '/'; }, 1500);
                    } else {
                        msg.textContent = (res.body && res.body.error) || 'Something went wrong.';
                        msg.className = 'msg err';
                        btn.disabled = false;
                    }
                }).catch(function () {
                    msg.textContent = 'Network error. Please try again.';
                    msg.className = 'msg err';
                    btn.disabled = false;
                });
            });
        }
    </script>
</body>
</html>
